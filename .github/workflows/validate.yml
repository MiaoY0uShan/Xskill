name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required portable bundle files
        run: |
          test -f README.md
          test -f xskill/AGENTS.md
          test -f xskill/question-requirements/SKILL.md
          test -f xskill/delete-scope/SKILL.md
          test -f xskill/semantic-architecture/SKILL.md
          test -f xskill/optimize-path/SKILL.md
          test -f xskill/shorten-iteration/SKILL.md
          test -f xskill/evidence-ledger/SKILL.md
          test -f xskill/metrics/SKILL.md
          test -f xskill/adaptive-improvement/SKILL.md
          test -f xskill/schema-memory/SKILL.md
          test -f xskill/templates/compiled-execution-brief.md
          test -f xskill/templates/context-budget-contract.json
          test -f xskill/templates/context-diet-map.md
          test -f xskill/templates/evidence-ledger.md
          test -f xskill/templates/metrics-report.md
          test -f adapters/README.md
          test -f docs/execution-protocol.md
          test -f install/codex/.agents/skills/xskill/SKILL.md
          test -f install/claude-code/.claude/skills/xskill/SKILL.md
          test -f install/gemini-cli/xskill/gemini-extension.json
          test -f install/gemini-cli/xskill/GEMINI.md
          test -f install/github-copilot-cli/.github/agents/xskill.agent.md
          if [ -f AGENTS.md ]; then echo "Root AGENTS.md should not be required in portable releases"; exit 1; fi
