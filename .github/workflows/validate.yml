name: Validate bundle

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required skill files
        run: |
          test -f AGENTS.md
          test -f xskill/question-requirements/SKILL.md
          test -f xskill/delete-scope/SKILL.md
          test -f xskill/optimize-path/SKILL.md
          test -f xskill/shorten-iteration/SKILL.md
          test -f xskill/automate-after-stable/SKILL.md
          test -f xskill/semantic-memory/SKILL.md
          test -f xskill/templates/execution-brief.md
          test -f xskill/templates/context-budget.md
          test -f xskill/templates/evidence-ledger.md
