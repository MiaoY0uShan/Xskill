name: Validate portable bundle

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f xskill/question-requirements/SKILL.md
          test -f xskill/delete-scope/SKILL.md
          test -f xskill/semantic-architecture/SKILL.md
          test -f xskill/optimize-path/SKILL.md
          test -f xskill/shorten-iteration/SKILL.md
          test -f xskill/evidence-ledger/SKILL.md
          test -f xskill/metrics/SKILL.md
          test -f xskill/adaptive-improvement/SKILL.md
          test -f xskill/schema-memory/SKILL.md
          test -f xskill/templates/question-requirements-report.md
          test -f xskill/templates/delete-scope-report.md
          test -f xskill/templates/semantic-architecture-report.md
          test -f xskill/templates/optimize-path-report.md
          test -f xskill/templates/shorten-iteration-report.md
          test -f xskill/templates/execution-brief.md
          test -f xskill/templates/compiled-execution-brief.md
          test -f xskill/templates/context-budget.md
          test -f xskill/templates/evidence-ledger.md
          test -f xskill/templates/metrics-report.md
          test -f xskill/templates/adaptive-improvement-report.md
          test -f xskill/templates/schema-memory-card.md
          test -f xskill/templates/automation-candidate.md
          test -f xskill/examples/password-reset.question-requirements.md
          test -f xskill/examples/password-reset.delete-scope.md
          test -f xskill/examples/xskill.semantic-architecture.md
          test -f xskill/examples/password-reset.optimize-path.md
          test -f xskill/examples/password-reset.shorten-iteration.md
          test -f xskill/examples/password-reset.execution-brief.md
          test -f xskill/examples/password-reset.compiled-execution-brief.json
          test -f xskill/examples/password-reset.evidence-ledger.md
          test -f xskill/examples/password-reset.metrics-report.md
          test -f xskill/examples/password-reset.adaptive-improvement.md
          test -f xskill/examples/validation-bug.schema-memory-card.md
          test -f docs/metrics.md
      - name: Check removed legacy skills
        run: |
          test ! -d xskill/automate-after-stable
          test ! -d xskill/learn-after-run
          test ! -d xskill/semantic-memory
      - name: Check portable scope
        run: |
          test ! -f pyproject.toml
          test ! -d musk_skills
          test ! -d tests
      - name: Check skill front matter
        run: |
          for f in xskill/*/SKILL.md; do
            grep -q '^---$' "$f"
            grep -q '^name:' "$f"
            grep -q '^description:' "$f"
          done
      - name: Check compiler language
        run: |
          grep -q 'portable task compiler' README.md
          grep -q 'compiled Execution Brief' README.md
          grep -q 'Compiled Execution Brief' xskill/optimize-path/SKILL.md
          grep -q 'TVP' README.md
          grep -q 'Tokens to Verified Progress' xskill/metrics/SKILL.md
