name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f README.md
          test -f START_HERE.md
          test -f INSTALL.md
          test -f TEST_XSKILL.md
          test -f xskill/SKILL.md
          test -f xskill/AGENTS.md
          test -f xskill/templates/idea-cards.md
          test -f xskill/templates/compiled-execution-brief.md
          test -f xskill/templates/context-budget-contract.md
          test -f xskill/templates/context-budget-contract.json
          test -f xskill/templates/evidence-ledger.md
          test -f scripts/sync-install-packs.ps1
          test -f docs/router.md
          test -f docs/execution-protocol.md
          test -f install/codex/TEST_XSKILL.md
          test -f install/codex/.agents/skills/xskill/SKILL.md
          test -f install/codex/.agents/skills/xskill/references/xskill/SKILL.md
          test -f install/claude-code/TEST_XSKILL.md
          test -f install/claude-code/.claude/skills/xskill/SKILL.md
          test -f install/claude-code/.claude/skills/xskill/references/xskill/SKILL.md
          test -f install/gemini-cli/TEST_XSKILL.md
          test -f install/gemini-cli/xskill/GEMINI.md
          test -f install/gemini-cli/xskill/gemini-extension.json
          test -f install/gemini-cli/xskill/xskill/SKILL.md
          test -f install/github-copilot-cli/TEST_XSKILL.md
          test -f install/github-copilot-cli/.github/agents/xskill.agent.md
          test -f install/github-copilot-cli/xskill/SKILL.md
      - name: Check skill metadata frontmatter
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          failures = []
          for path in Path(".").rglob("SKILL.md"):
              lines = path.read_text(encoding="utf-8").splitlines()
              if len(lines) < 4 or lines[0] != "---":
                  failures.append(f"{path}: missing YAML frontmatter")
                  continue
              try:
                  end = lines[1:].index("---") + 1
              except ValueError:
                  failures.append(f"{path}: unterminated YAML frontmatter")
                  continue

              frontmatter = lines[1:end]
              fields = {}
              for line in frontmatter:
                  if not line.strip():
                      continue
                  if ": " not in line:
                      failures.append(f"{path}: invalid frontmatter line: {line}")
                      continue
                  key, value = line.split(": ", 1)
                  fields[key] = value

              for key in ("name", "description"):
                  if key not in fields:
                      failures.append(f"{path}: missing {key}")

              description = fields.get("description")
              if description is not None:
                  if not (description.startswith('"') and description.endswith('"')):
                      failures.append(f"{path}: description must be double-quoted YAML")
                  else:
                      try:
                          json.loads(description)
                      except json.JSONDecodeError as exc:
                          failures.append(f"{path}: invalid quoted description: {exc}")

          if failures:
              raise SystemExit("\n".join(failures))
          PY
      - name: Check release version references
        run: |
          grep -q '## v0.2.4' CHANGELOG.md
          grep -q 'xskill-codex-v0.2.4.zip' dist/README.md
          grep -q 'xskill-claude-code-v0.2.4.zip' dist/README.md
          grep -q 'xskill-gemini-cli-v0.2.4.zip' dist/README.md
          grep -q 'xskill-github-copilot-cli-v0.2.4.zip' dist/README.md
          grep -q 'xskill-copy-paste-v0.2.4.md' dist/README.md
          grep -q 'xskill-codex-v0.2.4.zip' install/codex/README.md
          grep -q 'xskill-claude-code-v0.2.4.zip' install/claude-code/README.md
          grep -q 'xskill-gemini-cli-v0.2.4.zip' install/gemini-cli/README.md
          grep -q 'xskill-github-copilot-cli-v0.2.4.zip' install/github-copilot-cli/README.md
          grep -q '"version": "0.2.4"' install/gemini-cli/xskill/gemini-extension.json
          ! grep -E 'v0\.2\.2|v0\.2\.3' \
            dist/README.md \
            docs/portable-install.md \
            docs/release-checklist.md \
            install/codex/README.md \
            install/claude-code/README.md \
            install/gemini-cli/README.md \
            install/github-copilot-cli/README.md \
            install/gemini-cli/xskill/gemini-extension.json
      - name: Check proactive activation docs
        run: |
          grep -q 'activate Xskill proactively' xskill/README.md
          grep -q 'Use Xskill proactively' adapters/README.md
          grep -q 'Manual override' adapters/README.md
          ! grep -R 'Default trigger' \
            adapters \
            install/codex/.agents/skills/xskill/references/xskill/README.md \
            install/claude-code/.claude/skills/xskill/references/xskill/README.md \
            install/gemini-cli/xskill/xskill/README.md \
            install/github-copilot-cli/xskill/README.md
      - name: Check install pack source of truth docs
        run: |
          grep -q 'source of truth' install/README.md
          grep -q 'scripts/sync-install-packs.ps1' install/README.md
          grep -q 'scripts/sync-install-packs.ps1' docs/release-checklist.md
      - name: Check packaged xskill references
        run: |
          diff -ru xskill install/codex/.agents/skills/xskill/references/xskill
          diff -ru xskill install/claude-code/.claude/skills/xskill/references/xskill
          diff -ru xskill install/gemini-cli/xskill/xskill
          diff -ru xskill install/github-copilot-cli/xskill
      - name: Check JSON files
        run: |
          python -m json.tool install/gemini-cli/xskill/gemini-extension.json >/dev/null
          python -m json.tool xskill/templates/context-budget-contract.json >/dev/null
